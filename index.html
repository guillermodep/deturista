<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan de Turista | Asistente Virtual - deturista.com</title>
  <link rel="icon" type="image/x-icon" href="https://www.deturista.com/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Open Sans', Arial, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .logo-header img {
      height: 45px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: linear-gradient(180deg, #f8f4fc 0%, #efe6f7 50%, #e8daf0 100%);
    }

    .intro {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .intro h1 {
      color: #5B2D82;
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .intro p {
      color: #5d4037;
      font-size: 1rem;
    }

    .widget-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      height: 600px;
      border: 1px solid #e0e0e0;
    }

    .widget-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      background: #5B2D82;
      text-align: center;
      padding: 1rem;
      color: #b0bec5;
      font-size: 0.8rem;
    }

    footer a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      header {
        padding: 0.5rem 1rem;
      }

      .logo-header img {
        height: 40px;
      }

      main {
        padding: 1rem;
      }

      .widget-container {
        max-width: 100%;
        height: 520px;
        border-radius: 10px;
      }
      
      .intro h1 {
        font-size: 1.4rem;
      }

      .intro p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-header">
      <a href="https://www.deturista.com" target="_blank">
        <img src="logo.svg" alt="deturista.com">
      </a>
    </div>
  </header>

  <main>
    <div class="intro">
      <h1>¡Hola! Soy Juan de Turista</h1>
      <p>Tu asistente virtual para planificar el viaje perfecto</p>
    </div>

    <div class="widget-container">
      <iframe
        src="https://app.contactship.ai/widgets/4f870114-c144-4aaa-8af7-8bfaf6b95d80/embed"
        allow="microphone">
      </iframe>
    </div>
  </main>

  <footer>
    <a href="https://www.deturista.com" target="_blank">deturista.com</a> - Vuelos, Hoteles, Paquetes y más!
  </footer>
</body>
</html>
