<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan de Turista | Asistente Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #FFF5E6 0%, #FFE4C4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #FF6B35;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(255, 107, 53, 0.3);
    }

    .logo-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-header img {
      height: 40px;
    }

    .logo-header span {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .intro {
      text-align: center;
      margin-bottom: 2rem;
    }

    .intro h1 {
      color: #333;
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .intro p {
      color: #666;
      font-size: 1rem;
    }

    .widget-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      width: 100%;
      max-width: 420px;
      height: 620px;
    }

    .widget-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #999;
      font-size: 0.875rem;
    }

    footer a {
      color: #FF6B35;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .widget-container {
        max-width: 100%;
        height: 550px;
        border-radius: 16px;
      }
      
      .intro h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-header">
      <img src="https://www.deturista.com/images/logo.png" alt="deturista logo">
    </div>
  </header>

  <main>
    <div class="intro">
      <h1>¡Hola! Soy Juan de Turista</h1>
      <p>Tu asistente virtual para planificar el viaje perfecto</p>
    </div>

    <div class="widget-container">
      <iframe
        src="https://app.contactship.ai/widgets/4f870114-c144-4aaa-8af7-8bfaf6b95d80/embed"
        allow="microphone">
      </iframe>
    </div>
  </main>

  <footer>
    Powered by <a href="https://www.deturista.com" target="_blank">deturista.com</a>
  </footer>
</body>
</html>
